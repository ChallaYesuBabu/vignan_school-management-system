{% extends "base.html" %}
{% block content %}

<style>
.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

.table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

.table th {
    background: #2c3e50;
    color: white;
    padding: 10px;
}

.table td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}
</style>

<h2>📋 Manage Students</h2>

<div class="card">

<table class="table">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Class</th>
    <th>Section</th>
</tr>

{% for s in students %}
<tr>
    <td>{{ s.student_id }}</td>
    <td>{{ s.name }}</td>
    <td>{{ s.class }}</td>
    <td>{{ s.section }}</td>
</tr>
{% endfor %}

</table>

{% if students|length == 0 %}
<p>No students found ❌</p>
{% endif %}

</div>

{% endblock %}

{% extends "base.html" %}

{% block content %}

<style>

.quiz-container{
    width:800px;
    margin:40px auto;
}

.quiz-card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.1);
}

.page-title{
    font-size:36px;
    font-weight:bold;
    margin-bottom:25px;
    color:#2c3e50;
}

.quiz-details{
    display:grid;
    grid-template-columns:2fr 1fr 1fr 1fr;
    gap:15px;
    margin-bottom:30px;
}

.quiz-details input{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
}

.question-box{
    border:1px solid #ddd;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    background:#fafafa;
}

.question-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.question-box input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
}

.btn-add{
    background:#27ae60;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    margin-bottom:20px;
}

.btn-submit{
    width:100%;
    background:#3498db;
    color:white;
    border:none;
    padding:14px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.btn-submit:hover{
    background:#2980b9;
}

</style>

<div class="quiz-container">

    <div class="page-title">
        📝 Create Quiz
    </div>

    <form method="POST" id="quizForm">

        <!-- QUIZ DETAILS -->

        <div class="quiz-card">

            <div class="quiz-details">

                <input type="text"
                       name="quiz_title"
                       placeholder="Quiz Title (Example: Week 1 Quiz)"
                       required>

                <input type="date"
                       name="quiz_date"
                       required>

                <input type="time"
                       name="start_time"
                       required>

                <input type="time"
                       name="end_time"
                       required>

            </div>

            <!-- QUESTIONS -->

            <div id="questions-container">

                <div class="question-box">

                    <div class="question-title">
                        Question 1
                    </div>

                    <input type="text"
                           name="question_0"
                           placeholder="Enter Question"
                           required>

                    <input type="text"
                           name="option1_0"
                           placeholder="Option A"
                           required>

                    <input type="text"
                           name="option2_0"
                           placeholder="Option B"
                           required>

                    <input type="text"
                           name="option3_0"
                           placeholder="Option C"
                           required>

                    <input type="text"
                           name="option4_0"
                           placeholder="Option D"
                           required>

                    <input type="text"
                           name="answer_0"
                           placeholder="Correct Answer (A/B/C/D)"
                           required>

                </div>

            </div>

            <input type="hidden"
                   name="total_questions"
                   id="total_questions"
                   value="1">

            <button type="button"
                    class="btn-add"
                    onclick="addQuestion()">

                + Add Question

            </button>

            <button type="submit"
                    class="btn-submit">

                Create Quiz

            </button>

        </div>

    </form>

</div>

<script>

let questionCount = 1;

function addQuestion(){

    let container = document.getElementById("questions-container");

    let html = `

    <div class="question-box">

        <div class="question-title">
            Question ${questionCount + 1}
        </div>

        <input type="text"
               name="question_${questionCount}"
               placeholder="Enter Question"
               required>

        <input type="text"
               name="option1_${questionCount}"
               placeholder="Option A"
               required>

        <input type="text"
               name="option2_${questionCount}"
               placeholder="Option B"
               required>

        <input type="text"
               name="option3_${questionCount}"
               placeholder="Option C"
               required>

        <input type="text"
               name="option4_${questionCount}"
               placeholder="Option D"
               required>

        <input type="text"
               name="answer_${questionCount}"
               placeholder="Correct Answer (A/B/C/D)"
               required>

    </div>

    `;

    container.insertAdjacentHTML('beforeend', html);

    questionCount++;

    document.getElementById("total_questions").value = questionCount;
}

</script>

{% endblock %}

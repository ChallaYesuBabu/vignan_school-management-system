<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:#eef4fb;

    display:flex;

    justify-content:center;
    align-items:center;

    height:100vh;

}

.card{

    width:420px;

    background:#fff;

    border-radius:15px;

    padding:35px;

    box-shadow:0 15px 35px rgba(0,0,0,.15);

}

.card h2{

    text-align:center;

    color:#165ea8;

    margin-bottom:10px;

}

.card p{

    text-align:center;

    color:#666;

    margin-bottom:25px;

}

input{

    width:100%;

    padding:14px;

    border:1px solid #ccc;

    border-radius:8px;

    margin-bottom:20px;

    font-size:15px;

}

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:8px;

    background:#165ea8;

    color:#fff;

    font-size:16px;

    cursor:pointer;

}

button:hover{

    background:#0d4c8b;

}

.back{

    text-align:center;

    margin-top:20px;

}

.back a{

    text-decoration:none;

    color:#165ea8;

}

.flash{

    background:#d4edda;

    color:#155724;

    padding:12px;

    border-radius:8px;

    margin-bottom:20px;

}

</style>

</head>

<body>

<div class="card">

    <h2>🔑 Forgot Password</h2>

    <p>

        Send a password reset request to the Administrator.

    </p>

    {% with messages = get_flashed_messages() %}

        {% if messages %}

            {% for msg in messages %}

                <div class="flash">

                    {{ msg }}

                </div>

            {% endfor %}

        {% endif %}

    {% endwith %}

    <form method="POST">

        <input
            type="hidden"
            name="role"
            value="{{ role }}">

        {% if role == "student" %}

            <input
                type="text"
                name="user_id"
                placeholder="Enter Student ID"
                required>

        {% else %}

            <input
                type="text"
                name="user_id"
                placeholder="Enter Faculty ID"
                required>

        {% endif %}

        <button type="submit">

            Send Request

        </button>

    </form>

    <div class="back">

        <a href="/login">

            ← Back to Login

        </a>

    </div>

</div>

</body>

</html>

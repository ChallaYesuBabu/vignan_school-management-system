{% extends "base.html" %}

{% block content %}

<style>

.quiz-container{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

.quiz-title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:25px;
}

.question-box{
    margin-bottom:30px;
    padding:20px;
    border:1px solid #ddd;
    border-radius:10px;
}

.question{
    font-size:20px;
    font-weight:bold;
    margin-bottom:15px;
}

.option{
    margin-bottom:10px;
    font-size:16px;
}

.submit-btn{
    background:#27ae60;
    color:white;
    border:none;
    padding:12px 30px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.submit-btn:hover{
    background:#219150;
}

</style>

<div class="quiz-container">

    <div class="quiz-title">
        📝 {{ quiz.quiz_title }}
    </div>

    <form method="POST">

        {% for q in quiz.questions %}

        {% set question_index = loop.index0 %}

        <div class="question-box">

            <div class="question">
                Q{{ loop.index }}.
                {{ q.question }}
            </div>

            {% for opt in q.options %}

            <div class="option">

                <input
                    type="radio"
                    name="q{{ question_index }}"
                    value="{{ opt }}"
                    required
                >

                {{ opt }}

            </div>

            {% endfor %}

        </div>

        {% endfor %}

        <button type="submit" class="submit-btn">
            Submit Quiz
        </button>

    </form>

</div>

{% endblock %}

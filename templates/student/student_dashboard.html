{% extends "base.html" %}

{% block content %}

<style>
.dashboard-title{
    font-size:40px;
    font-weight:bold;
    margin-bottom:10px;
}

.welcome-box{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:30px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:15px;
    padding:30px;
    text-align:center;
    box-shadow:0px 4px 12px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    margin-bottom:15px;
    color:#2c3e50;
}

.card a{
    display:inline-block;
    padding:10px 18px;
    background:#3498db;
    color:white;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
}
</style>

<div class="dashboard-title">
    🎓 Student Dashboard
</div>

<div class="welcome-box">
    <h2>Welcome {{ student.name }}</h2>

    <p><b>Class:</b> {{ student.class }}</p>
    <p><b>Section:</b> {{ student.section }}</p>
</div>

<div class="cards">

    <div class="card">
        <h3>📘 Today Diary</h3>
        <a href="/student/today-diary">Open</a>
    </div>

    <div class="card">
        <h3>📅 Attendance</h3>
        <a href="/student/attendance">Open</a>
    </div>

    <div class="card">
        <h3>📊 View Marks</h3>
        <a href="/student/view-marks">Open</a>
    </div>

    <div class="card">
        <h3>📝 Quiz</h3>
        <a href="/student/quiz">Open</a>
    </div>

    <div class="card">
        <h3>📢 Notices</h3>
        <a href="/student/notices">Open</a>
    </div>

</div>

{% endblock %}

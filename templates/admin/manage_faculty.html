{% extends "base.html" %}

{% block content %}

<style>

.action-btn{
    padding:7px 16px;
    border-radius:8px;
    text-decoration:none;
    color:white !important;
    font-size:14px;
    font-weight:600;
    transition:0.3s;
    display:inline-block;
    border:none;
}

.edit-btn{
    background:#f39c12;
}

.edit-btn:hover{
    background:#d68910;
    transform:translateY(-2px);
}

.delete-btn{
    background:#e74c3c;
}

.delete-btn:hover{
    background:#c0392b;
    transform:translateY(-2px);
}

.page-title{
    font-size:38px;
    font-weight:bold;
    margin-bottom:25px;
    color:#2c3e50;
}

.card-box{
    background:white;
    padding:25px;
    border-radius:14px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#2c3e50;
    color:white;
    padding:14px;
    text-align:center;
}

td{
    border:1px solid #ddd;
    padding:14px;
    text-align:center;
}

tr:nth-child(even){
    background:#f8f9fa;
}

</style>

<div class="page-title">
    👨‍🏫 Manage Faculty
</div>

<div class="card-box">

<table>

    <thead>

        <tr>

            <th>Faculty ID</th>
            <th>Name</th>
            <th>Subject</th>
            <th>Class</th>
            <th>Phone</th>
            <th>Actions</th>

        </tr>

    </thead>

    <tbody>

        {% for f in faculty %}

        <tr>

            <td>{{ f.faculty_id }}</td>
            <td>{{ f.name }}</td>
            <td>{{ f.subject }}</td>
            <td>{{ f.class }}</td>
            <td>{{ f.phone }}</td>

            <td>

                <a href="/admin/edit-faculty/{{ f._id }}"
                   class="action-btn edit-btn">

                    Edit

                </a>

                <a href="/admin/delete-faculty/{{ f._id }}"
                   class="action-btn delete-btn"
                   onclick="return confirm('Are you sure you want to delete this faculty?')">

                    Delete

                </a>

            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

</div>

{% endblock %}

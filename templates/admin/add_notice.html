{% extends "base.html" %}

{% block content %}

<style>

.notice-container{
    max-width:700px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.notice-container h2{
    margin-bottom:25px;
    color:#2c3e50;
}

.notice-container label{
    font-weight:600;
    display:block;
    margin-bottom:8px;
}

.notice-container input,
.notice-container textarea,
.notice-container select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    margin-bottom:20px;
    font-size:15px;
}

.notice-container textarea{
    resize:vertical;
}

.notice-container button{
    background:#3498db;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.notice-container button:hover{
    background:#2980b9;
}

.flash{
    padding:12px;
    border-radius:6px;
    margin-bottom:20px;
    font-weight:bold;
}

.flash.success{
    background:#d4edda;
    color:#155724;
    border:1px solid #c3e6cb;
}

</style>

<div class="notice-container">

<h2>📢 Add Notice</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

<form method="POST">

<label>Notice Title</label>

<input
type="text"
name="title"
placeholder="Enter Notice Title"
required>

<label>Post For</label>

<select name="audience" required>
    <option value="both">👥 Teachers & Students</option>
    <option value="teachers">👨‍🏫 Teachers Only</option>
    <option value="students">🎓 Students Only</option>
</select>

<label>Notice Content</label>

<textarea
name="content"
rows="6"
placeholder="Enter Notice Details..."
required></textarea>

<button type="submit">
📢 Post Notice
</button>

</form>

</div>

{% endblock %}

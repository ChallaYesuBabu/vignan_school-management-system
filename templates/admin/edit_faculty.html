{% extends "base.html" %}

{% block content %}

<style>

.page-title{
    font-size:36px;
    font-weight:bold;
    margin-bottom:25px;
    color:#2c3e50;
}

.faculty-card{
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.1);
    max-width:750px;
}

.form-group{
    margin-bottom:22px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#2c3e50;
    font-size:15px;
}

input,
select{
    width:100%;
    padding:12px 15px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:15px;
    outline:none;
    transition:0.3s;
    box-sizing:border-box;
}

input:focus,
select:focus{
    border-color:#3498db;
    box-shadow:0px 0px 5px rgba(52,152,219,0.3);
}

.submit-btn{
    background:#3498db;
    color:white;
    border:none;
    padding:14px 24px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn:hover{
    background:#217dbb;
}

</style>

<div class="page-title">
    ✏️ Edit Faculty
</div>

<div class="faculty-card">

<form method="POST">

    <!-- FACULTY ID -->
    <div class="form-group">

        <label>
            Faculty ID
        </label>

        <input
            type="text"
            name="faculty_id"
            value="{{ faculty.faculty_id }}"
            required
        >

    </div>

    <!-- NAME -->
    <div class="form-group">

        <label>
            Faculty Name
        </label>

        <input
            type="text"
            name="name"
            value="{{ faculty.name }}"
            required
        >

    </div>

    <!-- SUBJECT -->
    <div class="form-group">

        <label>
            Subject
        </label>

        <select name="subject" required>

            <option {% if faculty.subject == "Telugu" %}selected{% endif %}>Telugu</option>
            <option {% if faculty.subject == "Hindi" %}selected{% endif %}>Hindi</option>
            <option {% if faculty.subject == "English" %}selected{% endif %}>English</option>
            <option {% if faculty.subject == "Maths" %}selected{% endif %}>Maths</option>
            <option {% if faculty.subject == "EVS" %}selected{% endif %}>EVS</option>
            <option {% if faculty.subject == "GK" %}selected{% endif %}>GK</option>
            <option {% if faculty.subject == "Computer" %}selected{% endif %}>Computer</option>
            <option {% if faculty.subject == "Science" %}selected{% endif %}>Science</option>
            <option {% if faculty.subject == "Natural Science" %}selected{% endif %}>Natural Science</option>
            <option {% if faculty.subject == "Physical Science" %}selected{% endif %}>Physical Science</option>
            <option {% if faculty.subject == "Social" %}selected{% endif %}>Social</option>

        </select>

    </div>

    <!-- CLASS -->
    <div class="form-group">

        <label>
            Assigned Class
        </label>

        <select name="class" required>

            {% for i in range(1,11) %}

                <option value="{{ i }}"
                {% if faculty.class == i|string %}selected{% endif %}>

                    Class {{ i }}

                </option>

            {% endfor %}

        </select>

    </div>

    <!-- ROLE -->
    <div class="form-group">

        <label>
            Faculty Role
        </label>

        <select name="role" required>

            <option value="subject_teacher"
            {% if faculty.role == "subject_teacher" %}selected{% endif %}>

                Subject Teacher

            </option>

            <option value="class_teacher"
            {% if faculty.role == "class_teacher" %}selected{% endif %}>

                Class Teacher

            </option>

        </select>

    </div>

    <!-- PHONE -->
    <div class="form-group">

        <label>
            Phone Number
        </label>

        <input
            type="text"
            name="phone"
            value="{{ faculty.phone }}"
        >

    </div>

    <!-- SUBMIT -->
    <button
        type="submit"
        class="submit-btn"
    >
        Update Faculty
    </button>

</form>

</div>

{% endblock %}

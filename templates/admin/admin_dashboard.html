{% extends "base.html" %}
{% block content %}

<style>
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
    text-align: center;
}

.card h3 {
    margin-bottom: 10px;
}

.btn {
    display: inline-block;
    padding: 8px 15px;
    background: #3498db;
    color: white;
    border-radius: 6px;
    text-decoration: none;
    margin-top: 10px;
}
</style>

<h2>📊 Admin Dashboard</h2>

<div class="cards">

    <div class="card">
        <h3>🎓 Students</h3>
        <p>Manage student data</p>
        <a href="/admin/manage-students" class="btn">View</a>
    </div>

    <div class="card">
        <h3>👨‍🏫 Faculty</h3>
        <p>Manage faculty</p>
        <a href="/admin/manage-faculty" class="btn">View</a>
    </div>

    <div class="card">
        <h3>📢 Notice Board</h3>
        <p>Send announcements</p>
        <a href="/admin/add-notice" class="btn">Open</a>
    </div>

    <div class="card">
        <h3>⚡ Quick Actions</h3>
        <a href="/admin/create-student" class="btn">+ Add Student</a><br><br>
        <a href="/admin/create-faculty" class="btn">+ Add Faculty</a>
    </div>

</div>

{% endblock %}

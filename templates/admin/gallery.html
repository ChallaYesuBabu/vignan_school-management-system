{% extends "base.html" %}

{% block content %}

<style>

.page-title{
    font-size:34px;
    font-weight:bold;
    color:#2c3e50;
    margin-bottom:25px;
}

.gallery-form{
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    margin-bottom:35px;
}

.gallery-form input,
.gallery-form textarea{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:18px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:15px;
}

.gallery-form textarea{
    height:90px;
    resize:none;
}

.upload-btn{
    background:#0d6efd;
    color:white;
    border:none;
    padding:12px 28px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.upload-btn:hover{
    background:#0b5ed7;
}

.gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

.gallery-card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    transition:.3s;
}

.gallery-card:hover{
    transform:translateY(-6px);
}

.gallery-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.gallery-content{
    padding:15px;
}

.gallery-content h3{
    margin-bottom:8px;
    color:#2c3e50;
}

.gallery-content p{
    margin:5px 0;
    color:#555;
}

.delete-btn{
    display:inline-block;
    margin-top:12px;
    padding:10px 18px;
    background:#dc3545;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.delete-btn:hover{
    background:#bb2d3b;
}

</style>

<h2 class="page-title">📸 School Photo Gallery</h2>

<div class="gallery-form">

<form method="POST" enctype="multipart/form-data">

<label>Photo Title</label>
<input
type="text"
name="title"
placeholder="Enter Photo Title"
required>

<label>Album Name</label>
<input
type="text"
name="album"
placeholder="Annual Day / Sports Day"
required>

<label>Description</label>
<textarea
name="description"
placeholder="Enter Description"></textarea>

<label>Select Image</label>
<input
type="file"
name="image"
required>

<button class="upload-btn" type="submit">
📤 Upload Photo
</button>

</form>

</div>

<div class="gallery-grid">

{% for photo in photos %}

<div class="gallery-card">

<img src="{{ url_for('static', filename='uploads/gallery/' + photo.image) }}">

<div class="gallery-content">

<h3>{{ photo.title }}</h3>

<p><b>Album:</b> {{ photo.album }}</p>

<p>{{ photo.description }}</p>

<p><small>{{ photo.date }}</small></p>

<a href="/admin/delete-photo/{{ photo._id }}"
class="delete-btn"
onclick="return confirm('Are you sure you want to delete this photo?')">
🗑 Delete
</a>

</div>

</div>

{% endfor %}

</div>

{% endblock %}

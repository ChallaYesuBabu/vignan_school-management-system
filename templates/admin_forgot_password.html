<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Password Reset | Vignan E.M. School</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#165ea8,#2f80c7,#3cb4d8);

    overflow:hidden;

}

/* Background */

body::before{

    content:"";

    position:absolute;

    width:450px;
    height:450px;

    background:rgba(255,255,255,.15);

    border-radius:50%;

    left:-120px;
    top:-120px;

    filter:blur(60px);

}

body::after{

    content:"";

    position:absolute;

    width:450px;
    height:450px;

    background:rgba(0,255,255,.12);

    border-radius:50%;

    right:-120px;
    bottom:-120px;

    filter:blur(60px);

}

/* Card */

.card{

    width:450px;

    background:rgba(255,255,255,.95);

    border-radius:18px;

    padding:35px;

    box-shadow:0 15px 35px rgba(0,0,0,.25);

    text-align:center;

    z-index:5;

}

/* Logo */

.logo{

    width:90px;
    height:90px;

    border-radius:50%;

    background:white;

    padding:5px;

    margin-bottom:15px;

}

.school{

    font-size:26px;

    font-weight:700;

    color:#165ea8;

}

.subtitle{

    color:#666;

    margin-bottom:25px;

}

h2{

    margin-bottom:25px;

    color:#333;

}

input{

    width:100%;

    padding:14px;

    margin:10px 0;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:15px;

}

input:focus{

    border-color:#165ea8;

    outline:none;

}

/* Button */

button{

    width:100%;

    padding:14px;

    margin-top:10px;

    background:#165ea8;

    color:white;

    border:none;

    border-radius:8px;

    cursor:pointer;

    font-size:16px;

    font-weight:600;

    transition:.3s;

}

button:hover{

    background:#0d4c8b;

}

.note{

    margin-top:20px;

    font-size:14px;

    color:#777;

}

.back{

    display:inline-block;

    margin-top:18px;

    text-decoration:none;

    color:#165ea8;

    font-weight:600;

}

.back:hover{

    text-decoration:underline;

}

.alert{

    background:#fff3cd;

    color:#856404;

    border:1px solid #ffeeba;

    padding:12px;

    border-radius:8px;

    margin-bottom:20px;

    font-size:14px;

}

</style>

</head>

<body>

<div class="card">

<img src="{{ url_for('static', filename='images/logo.jpeg') }}" class="logo">

<div class="school">

VIGNAN E.M. SCHOOL

</div>

<div class="subtitle">

School Management System

</div>

<h2>

🔑 Admin Password Reset

</h2>

<div class="alert">

Enter the Secret Admin Reset Code to create a new password.

</div>

<form method="POST">

<input
type="text"
name="username"
placeholder="Admin Username"
required>

<input
type="password"
name="secret_code"
placeholder="Secret Admin Reset Code"
required>

<input
type="password"
name="new_password"
placeholder="New Password"
required>

<input
type="password"
name="confirm_password"
placeholder="Confirm Password"
required>

<button type="submit">

Reset Password

</button>

</form>

<a href="/admin-login" class="back">

← Back to Admin Login

</a>

</div>

</body>

</html>

{% extends "base.html" %}

{% block content %}

<style>

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    transition:.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

</style>

<h1>📷 School Photo Gallery</h1>

<div class="gallery">

{% for photo in photos %}

<div>

    <img src="{{ url_for('static', filename='uploads/gallery/' + photo.image) }}">

    <h3>{{ photo.title }}</h3>

    <p>{{ photo.description }}</p>

</div>

{% endfor %}

</div>

{% endblock %}
